name: Sync to Gitee
on:
  schedule:
    - cron: '0 0 * * *'  # 每天午夜运行
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          repository: clone668/llama.cpp
          ref: master

      - name: Setup Git
        run: |
          git config user.name 'github-actions'
          git config user.email 'actions@github.com'

      - name: Add Gitee remote
        run: |
          git remote add gitee https://gitee.com/cloneai/llama.cpp.git

      - name: Set up authentication for Gitee
        run: |
          git config --global credential.helper store
          echo "https://Cloneai:${{ secrets.GITEE_TOKEN }}@gitee.com" > ~/.git-credentials

      - name: Push to Gitee
        run: |
          git push gitee master --force
          git push gitee --all
          git push gitee --tags
